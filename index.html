<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Ponts d'Or</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mes Ponts d'Or 🌴</h1>
    </header>

    <main id="app-content">
        
        <section id="tab-accueil" class="tab-content active">
            <h2>Prochain Objectif</h2>
            <div class="card" id="next-pont">
                <h3>Calcul en cours...</h3>
            </div>
        </section>

        <section id="tab-calendrier" class="tab-content">
            <h2>Calendrier 2026</h2>
            <div class="calendar-toggle">
                <button id="btn-mensuel" class="btn-toggle active">Mois</button>
                <button id="btn-annuel" class="btn-toggle">Année</button>
            </div>
            
            <div id="vue-mensuelle" class="calendar-view active">
                <div class="month-navigation">
                    <button id="prev-month">◀</button>
                    <h3 id="current-month-title">Mai 2026</h3>
                    <button id="next-month">▶</button>
                </div>
                <div id="month-container"></div>
            </div>

            <div id="vue-annuelle" class="calendar-view">
                <div id="year-container" class="year-grid"></div>
            </div>
        </section>

        <section id="tab-explorateur" class="tab-content">
            <h2>Liste des Ponts</h2>
            <div id="timeline">
                <p class="loading-text">⏳ Recherche des meilleurs ponts en cours...</p>
            </div>
        </section>

        <section id="tab-profil" class="tab-content">
            <h2>Mes Réglages</h2>
            <div class="settings-group">
                <label for="zone-select">Ma Zone Scolaire :</label>
                <select id="zone-select">
                    <option value="A">Zone A</option>
                    <option value="B">Zone B</option>
                    <option value="C">Zone C</option>
                </select>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-target="tab-accueil">🏠 Accueil</button>
        <button class="nav-btn" data-target="tab-calendrier">📅 Calendrier</button>
        <button class="nav-btn" data-target="tab-explorateur">🔭 Liste</button>
        <button class="nav-btn" data-target="tab-profil">⚙️ Profil</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
